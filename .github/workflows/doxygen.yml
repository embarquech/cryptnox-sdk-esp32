name: Build and deploy documentation

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository, pulling the cryptnox-sdk-cpp submodule at its
      #    latest main tip so Doxygen indexes the freshest core SDK alongside
      #    the ESP32 components (not the pin recorded in this repo).
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Bump cryptnox-sdk-cpp submodule to its main tip
        run: |
          git -C cryptnox-sdk-cpp fetch origin main --depth=1
          git -C cryptnox-sdk-cpp checkout FETCH_HEAD

      # 2. Install Doxygen (pinned: Ubuntu's apt ships 1.9.x which does not
      #    understand the `> [!IMPORTANT]` GitHub-style alert syntax we use in
      #    README.md) and Graphviz.
      - name: Install Doxygen and Graphviz
        env:
          DOXYGEN_VERSION: "1.15.0"
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz wget
          # Extract in /tmp so the bundled examples/ directory does NOT end
          # up inside the repo and get picked up by INPUT = . recursive.
          wget -q -O /tmp/doxygen.tar.gz \
            "https://www.doxygen.nl/files/doxygen-${DOXYGEN_VERSION}.linux.bin.tar.gz"
          tar xf /tmp/doxygen.tar.gz -C /tmp
          sudo install "/tmp/doxygen-${DOXYGEN_VERSION}/bin/doxygen" /usr/local/bin/doxygen
          doxygen --version

      # 3. Build Doxygen documentation
      - name: Generate Doxygen docs
        run: doxygen docs/Doxyfile

      # 3b. Install LaTeX and build the PDF (Doxygen LaTeX output, pdflatex)
      - name: Install LaTeX for PDF
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends doxygen-latex latexmk

      - name: Build PDF (pdflatex)
        run: |
          sed -i 's/\\documentclass\[twoside\]/\\documentclass[oneside]/' docs/latex/refman.tex
          make -C docs/latex
          cp docs/latex/refman.pdf docs/html/cryptnox-sdk-esp32.pdf

      # 4. Deploy HTML documentation to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/html
          publish_branch: gh-pages
          allow_empty_commit: false
          keep_files: false
          force_orphan: false
          enable_jekyll: false
