name: Static analysis
permissions:
  contents: read
  pull-requests: write
on:
  push:
  pull_request:
jobs:
  cppcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install cppcheck
        run: sudo apt-get install -y cppcheck

      # Common include paths so cppcheck resolves project headers
      # (uECC.h, CW_*.h, ESP-IDF mbedtls/esp_*.h are NOT installed in CI —
      # we suppress missingInclude rather than try to ship the full toolchain).
      - name: cppcheck (Cryptnox SDK + ESP32 adapters, C++)
        run: |
          cppcheck \
            --enable=warning,style,performance,portability \
            --std=c++17 \
            --language=c++ \
            --inline-suppr \
            --error-exitcode=1 \
            --suppress=missingInclude \
            --suppress=missingIncludeSystem \
            --suppress=unusedFunction \
            -I cryptnox-sdk-cpp \
            -I components/uECC/include \
            -I components/cryptnox_utils/include \
            -I components/crypto_provider/include \
            -I components/secure_channel/include \
            -I components/esp32_logger/include \
            --force \
            cryptnox-sdk-cpp/ \
            components/cryptnox_utils/ \
            components/crypto_provider/ \
            components/esp32_logger/ \
            components/uECC/ \
            components/secure_channel/ \
            main/

      - name: MISRA C analysis (.c drivers only)
        if: always()
        run: |
          cppcheck \
            --enable=all \
            --std=c99 \
            --language=c \
            --addon=misra \
            --inline-suppr \
            --error-exitcode=1 \
            --suppress=missingInclude \
            --suppress=missingIncludeSystem \
            --suppress=misra-config \
            --suppress=misra-c2012-17.3 \
            --suppress=misra-c2012-8.7 \
            --suppress=unusedFunction \
            --force \
            -I components/epd/include \
            -I components/pn532/include \
            components/epd/epd.c \
            components/pn532/pn532.c
