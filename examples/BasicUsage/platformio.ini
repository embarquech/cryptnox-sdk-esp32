; PlatformIO project configuration — BasicUsage example.
; Demonstrates PN532 initialisation, secure channel establishment, and signing.
;
; Prerequisites:
;   Clone with submodules: git clone --recurse-submodules <repo>
;
; Build & flash:
;   pio run -e esp32s3 -t upload
;
; Serial monitor:
;   pio device monitor

[env:esp32s3]
platform        = espressif32
board           = esp32-s3-devkitc-1
framework       = espidf
src_dir         = main
monitor_speed   = 115200
lib_extra_dirs  = ../..

; Select SPI or I²C in main/main.cpp by setting SPI_ENABLED / I2C_ENABLED.
; Default pin assignments target ESP32-S3-DevKitC-1.
