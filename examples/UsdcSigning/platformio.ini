; PlatformIO project configuration — UsdcSigning example.
; Demonstrates signing and broadcasting a USDC ERC-20 transfer on Ethereum Sepolia.
;
; Prerequisites:
;   1. Clone with submodules: git clone --recurse-submodules <repo>
;   2. Copy config.template.h to main/config.h and fill in:
;        WIFI_SSID / WIFI_PASSWORD
;        RPC_HOST / RPC_URL (PublicNode or Infura)
;        CARD_PIN, ADDR_FROM, ADDR_TO, ADDR_USDC
;      config.h is git-ignored — never commit it.
;
; WARNING: Edit CARD_PIN in main/config.h before flashing.
;          A wrong PIN decrements the card's retry counter.
;          Reaching zero permanently blocks the PIN.
;
; Build & flash:
;   pio run -e esp32s3 -t upload
;
; Serial monitor:
;   pio device monitor

[env:esp32s3]
platform        = espressif32
board           = esp32-s3-devkitc-1
framework       = espidf
src_dir         = main
monitor_speed   = 115200
lib_extra_dirs  = ../..

; mbedTLS certificate bundle and HTTPS client are enabled via sdkconfig.defaults.
; Pin assignments in main/main.cpp target ESP32-S3-DevKitC-1.
; Adjust SPI_MOSI, SPI_MISO, SPI_SCLK, NFC_CS for other boards.
