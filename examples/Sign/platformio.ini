; PlatformIO project configuration — Sign example.
; Demonstrates signing a 32-byte hash with the card's resident key.
;
; Prerequisites:
;   Clone with submodules: git clone --recurse-submodules <repo>
;
; WARNING: Edit DEMO_PIN in main/main.cpp before flashing.
;          A wrong PIN decrements the card's retry counter.
;          Reaching zero permanently blocks the PIN.
;
; Build & flash:
;   pio run -e esp32s3 -t upload
;
; Serial monitor:
;   pio device monitor

[env:esp32s3]
platform        = espressif32
board           = esp32-s3-devkitc-1
framework       = espidf
src_dir         = main
monitor_speed   = 115200
lib_extra_dirs  = ../..

; Pin assignments in main/main.cpp target ESP32-S3-DevKitC-1.
; Adjust SPI_MOSI, SPI_MISO, SPI_SCLK, NFC_CS for other boards.
